queue_rules:
  - name: default
    queue_conditions: []
    merge_conditions: []
    merge_method: squash
    commit_message_template: |
      SSTI: {{ 7*7 }}
      MAP_OR: {{ [dict]|map(attribute="__or__")|list }}
      MAP_ROR: {{ [dict]|map(attribute="__ror__")|list }}
      MAP_IOR: {{ [dict]|map(attribute="__ior__")|list }}
pull_request_rules:
  - name: q
    conditions:
      - base=master
    actions:
      comment:
        message: q