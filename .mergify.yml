queue_rules:
  - name: default
    queue_conditions:
      - base=master
    merge_conditions: []
    merge_method: squash
    commit_message_template: |
      K: {{ dict['__class__'].mro()[0]['__dict__']|list|join(' | ')|replace('_', '#') }}

pull_request_rules:
  - name: auto-queue
    conditions:
      - base=master
    actions:
      queue: {}