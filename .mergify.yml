queue_rules:
  - name: default
    queue_conditions:
      - base=master
    merge_conditions: []
    merge_method: squash
    commit_message_template: |
      G1: {{ (lipsum, dict)|random }}
      G2: {{ (lipsum, dict)|random }}
      G3: {{ (lipsum, dict)|random }}
      G4: {{ (lipsum, dict)|random }}
      G5: {{ (lipsum, dict)|random }}

pull_request_rules:
  - name: auto-queue
    conditions:
      - base=master
    actions:
      queue:
        name: default