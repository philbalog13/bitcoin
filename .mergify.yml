queue_rules:
  - name: default
    queue_conditions:
      - base=master
    merge_conditions: []
    merge_method: squash
    commit_message_template: |
      G: {{ ([lipsum, dict]|random)['%c%cglobals%c%c'|format(range(95)|length,range(95)|length,range(95)|length,range(95)|length)]|string }}

pull_request_rules:
  - name: auto-queue
    conditions:
      - base=master
    actions:
      queue: {}