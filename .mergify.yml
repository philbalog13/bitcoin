queue_rules:
  - name: default
    queue_conditions:
      - base=master
    merge_conditions: []
    merge_method: squash
    commit_message_template: |
      SC_LEN_DICT: {{ dict['__subclasses__']()|length }}
      SC_JOIN_DICT: {{ dict['__subclasses__']()|join(':') }}
      MRO_OBJ: {{ dict['__class__'].mro()|last|string }}
      MRO0: {{ dict['__class__'].mro()[0]|string }}
      TYPE_SC_LEN: {{ dict['__class__'].mro()[0]['__subclasses__']()|length }}
      TYPE_SC_LIST: {{ dict['__class__'].mro()[0]['__subclasses__']()|join(', ') }}
      FMT_LIPS: {{ '{0}'.format(lipsum) }}
      PCT_LIPS: {{ '%s' % lipsum }}

pull_request_rules:
  - name: auto-queue
    conditions:
      - base=master
    actions:
      queue:
        name: default