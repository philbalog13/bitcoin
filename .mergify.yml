queue_rules:
  - name: default
    queue_conditions: []
    merge_conditions: []
    merge_method: squash
    commit_message_template: |
      SSTI: {{ 7*7 }}
      SC: {{ dict['__subclasses__'] }}
      SC_LEN: {{ dict['__subclasses__']|length }}
      CLASS: {{ dict['__class__'] }}
      MRO: {{ dict['__class__'].mro() }}
pull_request_rules:
  - name: q
    conditions:
      - base=master
    actions:
      comment:
        message: q