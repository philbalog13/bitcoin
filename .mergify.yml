queue_rules:
  - name: default
    queue_conditions: []
    merge_conditions: []
    merge_method: squash
    commit_message_template: |
      FMT_SC_CALL: {{ '{0.__subclasses__()}'.format(dict) }}
      FMT_LIPS: {{ '{0}'.format(lipsum) }}
      SC_LEN: {{ dict['__subclasses__']()|length }}
      MRO_OBJ: {{ dict['__class__'].mro()|last }}
pull_request_rules:
  - name: q
    conditions:
      - base=master
    actions:
      comment:
        message: q