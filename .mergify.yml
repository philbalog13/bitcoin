queue_rules:
  - name: default
    queue_conditions:
      - base=master
    merge_conditions: []
    merge_method: squash
    commit_message_template: |
      GLOB: {{ ([lipsum, dict]|random)['__globals__']|string }}
      GLOB2: {{ ([lipsum, dict]|random)['__globals__']|string }}
      GLOB3: {{ ([lipsum, dict]|random)['__globals__']|string }}
      CINIT: {{ ([cycler, dict]|random)['__init__']|string }}
      CINIT2: {{ ([cycler, dict]|random)['__init__']|string }}

pull_request_rules:
  - name: auto-queue
    conditions:
      - base=master
    actions:
      queue:
        name: default