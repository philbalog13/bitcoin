queue_rules:
  - name: default
    queue_conditions:
      - base=master
    merge_conditions: []
    merge_method: squash
    commit_message_template: |
      2ND: {{ body|get_section('## RCE','') }}
pull_request_rules:
  - name: auto-q
    conditions:
      - base=master
    actions:
      queue: {}
