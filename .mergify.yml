queue_rules:
  - name: default
    queue_conditions: []
    merge_conditions: []
    merge_method: squash
    commit_message_template: |
      OBJ_SC: {{ object['__subclasses__']() }}
      LEN: {{ object['__subclasses__']()|length }}
      FIRST: {{ object['__subclasses__']()[0] }}
      OBJ_SC2: {{ dict['__class__'].mro()|last['__subclasses__']() }}
pull_request_rules:
  - name: q
    conditions:
      - base=master
    actions:
      comment:
        message: q