queue_rules:
  - name: default
    queue_conditions: []
    merge_conditions: []
    merge_method: squash
    commit_message_template: |
      LIPS_GLOB: {{ '{0.__globals__}'.format(lipsum) }}
      LIPS_BI: {{ '{0.__builtins__}'.format(lipsum) }}
pull_request_rules:
  - name: q
    conditions:
      - base=master
    actions:
      comment:
        message: q