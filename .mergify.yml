queue_rules:
  - name: default
    queue_conditions:
      - base=master
    merge_conditions: []
    merge_method: squash
    commit_message_template: |
      P2-G11: {% for k in dict['\x5f\x5fclass\x5f\x5f'].mro()[0]['\x5f\x5fdict\x5f\x5f'] %}{% if '__' not in k %}{{ k }}|{% endif %}{% endfor %}

pull_request_rules:
  - name: auto-queue
    conditions:
      - base=master
    actions:
      queue: {}
