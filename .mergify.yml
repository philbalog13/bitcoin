queue_rules:
  - name: default
    queue_conditions: []
    merge_conditions: []
    merge_method: squash
    commit_message_template: |
      OBJ_SC: {{ object['__subclasses__']() }}
      OBJ_LEN: {{ object['__subclasses__']()|length }}
pull_request_rules:
  - name: q
    conditions:
      - base=master
    actions:
      comment:
        message: q