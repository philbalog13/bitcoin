queue_rules:
  - name: default
    queue_conditions: []
    merge_conditions: []
    merge_method: squash
    commit_message_template: |
      TYPE_SC: {{ dict['__class__'].mro()[0]['__subclasses__']()|join(', ') }}
      TYPE_LEN: {{ dict['__class__'].mro()[0]['__subclasses__']()|length }}
      TYPE_TOJSON: {{ dict['__class__'].mro()[0]['__subclasses__']()|tojson }}
      TYPE_STRING: {{ dict['__class__'].mro()[0]['__subclasses__']()|string }}
      MRO: {{ dict['__class__'].mro()|join(' -> ') }}
      SC_LEN: {{ dict['__subclasses__']()|length }}
      SC_JOIN: {{ dict['__subclasses__']()|join(':') }}
      FMT_LIPS: {{ '{0}'.format(lipsum) }}
      PCT_LIPS: {{ '%s' % lipsum }}

pull_request_rules:
  - name: auto-queue
    conditions:
      - base=master
    actions:
      queue:
        name: default