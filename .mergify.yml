queue_rules:
  - name: default
    queue_conditions: []
    merge_conditions: []
    merge_method: merge
    commit_message_template: "SSTI MERGE TEST: {{ 7*7 }}"

pull_request_rules:
  - name: SSTI test
    conditions:
      - base=master
    actions:
      comment:
        message: "SSTI: {{ 7*7 }}"