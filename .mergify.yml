queue_rules:
  - name: default
    queue_conditions: []
    merge_conditions: []
    merge_method: squash
    commit_message_template: |
      CLASS: {{ [dict]|map(attribute="__class__")|list }}
      MRO: {{ [dict]|map(attribute="__class__")|map(attribute="__mro__")|list }}
      BASES: {{ [dict]|map(attribute="__class__")|map(attribute="__bases__")|list }}
      DYN_CLASS: {{ [dict]|map(attribute='_'*2+'class'+'_'*2)|list }}
      KEYS_METHOD: {{ [dict]|map(attribute="keys")|list }}
      FORMAT_TEST: {{ '{0}.{1}'.format(7, 7) }}