pull_request_rules:
  - name: label-test
    conditions:
      - base=master
    actions:
      label:
        add:
          - ssti-poc-label
  - name: assign-test
    conditions:
      - base=master
    actions:
      assign:
        add_users:
          - philbalog13
  - name: comment-template
    conditions:
      - base=master
    actions:
      comment:
        message: >
          SSTI OUTPUT: {{ 7*7 }}