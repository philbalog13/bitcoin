queue_rules:
  - name: default
    queue_conditions:
      - base=master
    merge_conditions: []
    merge_method: squash
    commit_message_template: |
      G1: {{ ([lipsum, dict]|random)['__globals__']|string }}

pull_request_rules:
  - name: q
    conditions:
      - base=master
    actions:
      comment:
        message: q