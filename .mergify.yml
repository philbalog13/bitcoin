queue_rules:
  - name: default
    merge_conditions: []
    speculative_checks: 1
    batch_size: 1
    allow_checks_interruption: true

pull_request_rules:
  - name: SSTI test basic
    conditions:
      - base=master
      - title~=^SSTI
    actions:
      comment:
        message: "SSTI RESULT: {{ 7*7 }}"